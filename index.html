<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Första Webbsida</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        main {
            padding: 40px 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2c5282;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e3a5f;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background-color: #ddd;
        }
    </style>
</head>
<body>

<header>
    <h1>Välkommen!</h1>
</header>

<main>
    <h2>Min första GitHub Pages-sida</h2>
    <p>Om du ser detta som en designad sida och inte rå HTML-kod – då fungerar allt korrekt 🚀</p>
    <button onclick="sayHello()">Klicka här</button>
</main>

<footer>
    <p>© 2026 Min Webbplats</p>
</footer>

<script>
    function sayHello() {
        alert("Det fungerar! 🎉");
    }
</script>

</body>
</html>
